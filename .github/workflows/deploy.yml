name: Deploy Weather App to AWS and Azure

# i want this pipeline to run automatically on every push to main
# and also have a manual trigger button in GitHub Actions
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.14.5

jobs:
  # -------------------------------------------------------
  # CI STAGE - Validate before deploying
  # -------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      # Step 1 - checkout my code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - check all three app files exist before deploying
      # if any file is missing the pipeline stops here
      - name: Check app files exist
        run: |
          echo "Checking required files exist..."
          test -f app/index.html && echo "index.html exists" || exit 1
          test -f app/style.css && echo "style.css exists" || exit 1
          test -f app/app.js && echo "app.js exists" || exit 1
          echo "All required files present"

      # Step 3 - make sure API key is configured in app.js
      # catches accidental commits with placeholder API key
      - name: Check API key is configured
        run: |
          if grep -q "YOUR_API_KEY_HERE" app/app.js; then
            echo "ERROR: API key not configured in app.js"
            exit 1
          else
            echo "API key is configured"
          fi

      # Step 4 - install Terraform for validation checks
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 5 - check Terraform files are properly formatted
      # terraform fmt -check fails if any file needs formatting
      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      # Step 6 - validate Terraform configuration is syntactically correct
      # catches any errors in main.tf before we try to deploy
      - name: Terraform Validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate

  # -------------------------------------------------------
  # CD STAGE - Deploy to AWS and Azure using Terraform
  # only runs if all validation checks pass
  # -------------------------------------------------------
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate

    steps:
      # Step 1 - checkout my code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - configure AWS credentials from GitHub Secrets
      # i never hardcode credentials - they are stored as encrypted secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 3 - login to Azure using service principal credentials
      # stored as encrypted GitHub Secrets - never hardcoded
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 4 - install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 5 - recreate terraform.tfvars from GitHub Secrets
      # this file is in .gitignore so i recreate it dynamically in the pipeline
      - name: Create terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars << EOF
          aws_region            = "us-east-1"
          s3_bucket_name        = "weather-app-aws-33454"
          azure_subscription_id = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          azure_location        = "East US"
          azure_resource_group  = "weather-app-rg"
          azure_storage_account = "weatherapp6969"
          domain_name           = "anil-weatherapp.online"
          route53_zone_id       = ""
          EOF

      # Step 6 - initialize Terraform and connect to S3 remote state
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # Step 7 - preview what changes will be made before deploying
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      # Step 8 - deploy everything to AWS and Azure automatically
      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # Step 9 - invalidate CloudFront cache after every deployment
      # so users always get the latest version of the app
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
